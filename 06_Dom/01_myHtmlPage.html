<!--
  WINDOW -> DOCUMENT -> HTML 
  HTML -> HEAD , BODY [html can consist of two parts. a) HEAD , b) BODY]
      HEAD -> TITLE , META [head can consist of two parts. a) TITLE , B) META]
         TITLE -> Title has text node like 'DOM Learning'
         META -> Meta has attribute like charset="UTF-8"
      BODY-> DIV
         DIV -> h1 , p [Div can have h1 , p ]

            p ->paragraph has text node like My Name is Neeraj. I am 6 year old.
