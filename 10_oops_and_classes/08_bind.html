<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React</title>
</head>
<body>
     <button>Button Click</button>
</body>
<script>
    class React{
        constructor(){
            this.library="React"
            this.server="https//localhost:3000"

            //requirment
            document.querySelector('button')
            .addEventListener('click',this.handleClick.bind(this))  // it bind the data which is come by using this i.e this.library="React"  ,   this.server="https//localhost:3000"
        }


        handleClick(){
            console.log("Button clicked");
            console.log(this.server);
            
        }
    }
    const app=new React()

</script>
</html>
