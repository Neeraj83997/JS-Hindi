<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Clouser</title>
</head>
<body style="background-color: #212121;">
    <button id="green">Green</button>
    <button id="orange">Orange</button>
</body>
<script>
     // Lexical scoping
     function Outer(){
        let myName='Ram'
        function Inner(){
            let age=56
            console.log(`Hi ${myName}, Inner function called`);
            
        }
        Inner()
        //console.log("Age ",age); // not accessable here
     }
     
     Outer()
     //console.log("htyhtyh",myName); //not accessable here


     //Clouser
    function makeFunc() {
        const name = "Mozilla";
        function displayName() {
            console.log(name);
        }
        return displayName; //when we return displayName function, it will return it's whole lexical scope accessable value  including with variable of outer class i.e  Mozilla, it happen because of lexical scoping
    }
    const myFunc = makeFunc();
    myFunc();

    //Example for Clouser

    // document.getElementById('green').onclick=function () {
    //     document.body.style.backgroundColor='green'
    // }
    // document.getElementById('orange').onclick=function () {
    //     document.body.style.backgroundColor='orange'
    // }

    const clickHandler=function (myColor){
       
        return  function display(){
                    document.body.style.backgroundColor=`${myColor}`
                    const cl=document.body.style.backgroundColor
                    console.log('clicked color is',cl); // retuen color in string
                }
        
    }
    document.getElementById('green').onclick=clickHandler('green')
    document.getElementById('orange').onclick=clickHandler('orange')


     

</script>
</html>
